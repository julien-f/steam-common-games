<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam Common Games</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #1b2838;
  --bg1: #2a475e;
  --bg2: #1e3a5f;
  --bg3: #17212b;
  --text0: #c6d4df;
  --text1: #8f98a0;
  --text2: #4c6b8a;
  --accent: #1a9fff;
  --accent2: #66c0f4;
  --border: #3d5068;
  --r: 6px;
}

body {
  background: var(--bg0);
  color: var(--text0);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 36px 20px 60px;
}

/* Header */
header { text-align: center; margin-bottom: 36px; }
header h1 {
  font-size: 26px;
  font-weight: 600;
  color: var(--accent2);
  letter-spacing: 0.4px;
}
header p { color: var(--text1); margin-top: 6px; font-size: 13px; }

/* Card */
.card {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 22px 24px;
  margin-bottom: 18px;
}
.card h2 { font-size: 13px; font-weight: 600; color: var(--text1); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px; }

/* User inputs */
#user-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

.user-row { display: flex; gap: 8px; align-items: center; }
.user-row input {
  flex: 1;
  padding: 9px 12px;
  background: var(--bg0);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text0);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}
.user-row input:focus { border-color: var(--accent); }
.user-row input::placeholder { color: var(--text2); }

.btn {
  padding: 9px 18px;
  border: none;
  border-radius: var(--r);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.btn-remove {
  flex-shrink: 0;
  width: 32px;
  padding: 0;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text1);
  font-size: 17px;
  line-height: 30px;
  text-align: center;
  border-radius: var(--r);
  cursor: pointer;
}
.btn-remove:hover { background: rgba(200,60,60,0.2); border-color: #cc4040; color: #ff8888; }

.actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text0);
}
.btn-ghost:hover { background: var(--bg0); }

.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: #1490e8; }
.btn-primary:disabled { background: var(--bg2); color: var(--text2); cursor: not-allowed; }

/* Alerts */
.alert {
  padding: 12px 16px;
  border-radius: var(--r);
  margin-bottom: 16px;
  font-size: 13px;
  line-height: 1.5;
}
.alert-error {
  background: rgba(200,50,50,0.12);
  border: 1px solid rgba(200,50,50,0.35);
  color: #ff8888;
}
.alert-warn {
  background: rgba(228,168,46,0.1);
  border: 1px solid rgba(228,168,46,0.3);
  color: #e4c46e;
}

/* Results */
.results-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.results-header h2 { font-size: 16px; font-weight: 600; color: var(--text0); }
.results-meta { font-size: 12px; color: var(--text1); }

/* Progress */
.progress-wrap { margin-bottom: 14px; }
.progress-text { font-size: 12px; color: var(--text1); margin-bottom: 6px; }
.progress-bar-bg {
  background: var(--bg3);
  border-radius: 999px;
  height: 3px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: var(--accent);
  transition: width 0.25s ease;
  border-radius: 999px;
}

/* Table */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--r);
}

table { width: 100%; border-collapse: collapse; }

thead th {
  background: var(--bg3);
  color: var(--text1);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 9px 14px;
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  user-select: none;
}
thead th.sortable { cursor: pointer; }
thead th.sortable:hover { color: var(--text0); }
thead th.active { color: var(--accent2); }
.th-inner { display: flex; align-items: center; gap: 5px; }
.sort-icon { font-size: 10px; opacity: 0.5; }
thead th.active .sort-icon { opacity: 1; }

tbody tr { border-bottom: 1px solid rgba(61,80,104,0.4); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(42,71,94,0.45); }

tbody td { padding: 9px 14px; vertical-align: middle; }

/* Game name cell */
.td-name { min-width: 200px; }
.td-name a { color: var(--text0); text-decoration: none; font-weight: 500; }
.td-name a:hover { color: var(--accent2); }

/* Score cell */
.td-score { min-width: 100px; }
.score-num {
  font-size: 19px;
  font-weight: 700;
  line-height: 1;
}
.score-label { font-size: 11px; color: var(--text1); margin-top: 2px; }

/* HLTB cells */
.td-hltb { min-width: 80px; font-variant-numeric: tabular-nums; }

.dim { color: var(--text2); }

/* Game groups */
.game-group { margin-bottom: 32px; }
.group-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
}
.group-title { font-size: 15px; font-weight: 600; color: var(--text0); }
.group-meta { font-size: 12px; color: var(--text1); }

/* Skeleton shimmer */
@keyframes shimmer {
  0%   { background-position: -300px 0; }
  100% { background-position:  300px 0; }
}
.sk {
  display: inline-block;
  width: 52px;
  height: 14px;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--bg1) 25%, #3a5870 50%, var(--bg1) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s linear infinite;
  vertical-align: middle;
}
.sk.sm { width: 32px; height: 13px; }

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block;
  width: 15px; height: 15px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  vertical-align: middle;
  margin-right: 7px;
}

/* Family member sub-rows */
.player-slot { display: flex; flex-direction: column; gap: 6px; }
.family-row { display: flex; gap: 8px; align-items: center; padding-left: 40px; }
.btn-add-family {
  flex-shrink: 0;
  width: 32px;
  padding: 0;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 17px;
  line-height: 30px;
  text-align: center;
  border-radius: var(--r);
  cursor: pointer;
}
.btn-add-family:hover { background: rgba(26,159,255,0.12); border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Steam Common Games</h1>
    <p>Find games shared across multiple Steam libraries, with ratings and playtime estimates</p>
  </header>

  <div class="card">
    <h2>Steam Users</h2>
    <div id="user-inputs"></div>
    <div class="actions">
      <button class="btn btn-ghost" id="add-btn">+ Add player</button>
      <button class="btn btn-primary" id="search-btn">Find Common Games</button>
    </div>
  </div>

  <div id="alerts"></div>
  <div id="results"></div>

</div>
<script>
// ── State ──────────────────────────────────────────────────────────────────

let games = [];     // flat: { appid, name, groupKey, loading, details }
let groups = [];    // [{ userIndices, games }] — ordered, from server
let slots = [];     // [[{steamid, personaname, profileurl}, ...], ...] — one entry per logical player
let sortCol = 'score';
let sortDir = -1;
let runId = 0;      // increments on each search to cancel stale updates

// ── Init ───────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('add-btn').addEventListener('click', () => addPlayerSlot());
  document.getElementById('search-btn').addEventListener('click', findCommonGames);

  fetch('/api/health').then(r => r.json()).then(d => {
    if (!d.configured) {
      showAlert(
        'STEAM_API_KEY is not configured. ' +
        'Get one at steamcommunity.com/dev/apikey, then restart: STEAM_API_KEY=yourkey node server.js',
        'warn'
      );
    }
  }).catch(() => {});

  loadFromUrl();
});

// Restore state when the user navigates back/forward
window.addEventListener('popstate', loadFromUrl);

function loadFromUrl() {
  // Each u= param is a comma-joined list of accounts for one logical player slot.
  // Old single-account URLs (?u=alice&u=bob) parse naturally as single-member slots.
  const urlSlots = new URLSearchParams(location.search).getAll('u')
    .map(s => s.split(',').map(v => v.trim()).filter(Boolean));
  const container = document.getElementById('user-inputs');
  container.innerHTML = '';
  if (urlSlots.length >= 2 && urlSlots.every(s => s.length > 0)) {
    urlSlots.forEach(accounts => addPlayerSlot(accounts));
    findCommonGames({ pushState: false });
  } else {
    addPlayerSlot();
    addPlayerSlot();
    games = [];
    slots = [];
    document.getElementById('results').innerHTML = '';
    document.title = 'Steam Common Games';
  }
}

// ── Player slot input rows ─────────────────────────────────────────────────

function addPlayerSlot(accounts = ['']) {
  const container = document.getElementById('user-inputs');
  const slot = document.createElement('div');
  slot.className = 'player-slot';

  const primaryRow = document.createElement('div');
  primaryRow.className = 'user-row';

  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Steam username, profile URL, or 64-bit ID';
  input.value = accounts[0] || '';
  input.addEventListener('keydown', e => { if (e.key === 'Enter') findCommonGames(); });

  const addFamilyBtn = document.createElement('button');
  addFamilyBtn.className = 'btn-add-family';
  addFamilyBtn.title = 'Add a family member who shares their library with this player';
  addFamilyBtn.textContent = '+';
  addFamilyBtn.addEventListener('click', () => addFamilyMember(slot));

  const removeSlotBtn = document.createElement('button');
  removeSlotBtn.className = 'btn-remove';
  removeSlotBtn.title = 'Remove player';
  removeSlotBtn.textContent = '×';
  removeSlotBtn.addEventListener('click', () => {
    if (document.querySelectorAll('.player-slot').length > 2) slot.remove();
  });

  primaryRow.appendChild(input);
  primaryRow.appendChild(addFamilyBtn);
  primaryRow.appendChild(removeSlotBtn);
  slot.appendChild(primaryRow);

  for (let i = 1; i < accounts.length; i++) addFamilyMember(slot, accounts[i]);

  container.appendChild(slot);
  if (!accounts[0]) input.focus();
}

function addFamilyMember(slot, value = '') {
  const row = document.createElement('div');
  row.className = 'family-row';

  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Steam username, profile URL, or 64-bit ID';
  input.value = value;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') findCommonGames(); });

  const rm = document.createElement('button');
  rm.className = 'btn-remove';
  rm.title = 'Remove family member';
  rm.textContent = '−';
  rm.addEventListener('click', () => row.remove());

  row.appendChild(input);
  row.appendChild(rm);
  slot.appendChild(row);
  if (!value) input.focus();
}

function getSlots() {
  return [...document.querySelectorAll('.player-slot')].map(slot =>
    [...slot.querySelectorAll('input')]
      .map(i => normalizeInput(i.value.trim()))
      .filter(Boolean)
  ).filter(s => s.length > 0);
}

// Extract username/ID from a pasted Steam profile URL
function normalizeInput(raw) {
  const mId  = raw.match(/steamcommunity\.com\/id\/([^/?\s]+)/);
  if (mId)  return mId[1];
  const mNum = raw.match(/steamcommunity\.com\/profiles\/(\d+)/);
  if (mNum) return mNum[1];
  return raw;
}

// ── Alerts ─────────────────────────────────────────────────────────────────

function clearAlerts() { document.getElementById('alerts').innerHTML = ''; }

function showAlert(msg, type = 'error') {
  const el = document.createElement('div');
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  const box = document.getElementById('alerts');
  box.innerHTML = '';
  box.appendChild(el);
}

// ── Main search flow ───────────────────────────────────────────────────────

async function findCommonGames({ pushState = true } = {}) {
  const inputSlots = getSlots();
  if (inputSlots.length < 2) { showAlert('Enter at least 2 Steam users.'); return; }

  clearAlerts();

  if (pushState) {
    const params = new URLSearchParams();
    const cmp = (a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' });
    [...inputSlots]
      .map(slot => [...slot].sort(cmp))           // sort members within each slot
      .sort((a, b) => cmp(a[0], b[0]))            // sort slots by their first member
      .forEach(slot => params.append('u', slot.join(',')));
    history.pushState(null, '', `?${params}`);
  }

  const thisRun = ++runId;
  document.getElementById('search-btn').disabled = true;
  document.getElementById('results').innerHTML =
    '<div style="padding:16px 0;color:var(--text1)"><span class="spinner"></span>Fetching Steam libraries…</div>';

  try {
    const res = await fetch('/api/common-games', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slots: inputSlots }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    if (thisRun !== runId) return;
    groups = data.groups || [];
    games = groups.flatMap(g => {
      const key = g.userIndices.join(',');
      return g.games.map(game => ({ ...game, groupKey: key, loading: true, details: null }));
    });
    slots = data.slots || [];

    renderPage();
    await loadAllDetails(thisRun);
    if (thisRun === runId) refreshTable();
  } catch (err) {
    if (thisRun !== runId) return;
    showAlert(err.message);
    document.getElementById('results').innerHTML = '';
  } finally {
    document.getElementById('search-btn').disabled = false;
  }
}

// ── Progressive detail loading ─────────────────────────────────────────────

async function loadAllDetails(thisRun) {
  if (!games.length) return;

  const CONCURRENCY = 5;
  const queue = games.map((_, i) => i);
  let loaded = 0;
  let inFlight = 0;

  updateProgress(0, games.length);

  await new Promise(resolve => {
    function next() {
      while (inFlight < CONCURRENCY && queue.length > 0) {
        const idx = queue.shift();
        inFlight++;
        fetchDetails(idx, thisRun).finally(() => {
          loaded++;
          inFlight--;
          if (thisRun === runId) updateProgress(loaded, games.length);
          if (inFlight === 0 && queue.length === 0) resolve();
          else next();
        });
      }
      if (queue.length === 0 && inFlight === 0) resolve();
    }
    next();
  });
}

async function fetchDetails(idx, thisRun) {
  const g = games[idx];
  try {
    const res = await fetch(`/api/game-details/${g.appid}?name=${encodeURIComponent(g.name)}`);
    const data = await res.json();
    games[idx].details = data;
  } catch {
    games[idx].details = { rating: null, hltb: null };
  }
  games[idx].loading = false;
  if (thisRun === runId) updateRow(idx);
}

// ── Rendering ──────────────────────────────────────────────────────────────

function slotDisplayName(i) {
  return (slots[i] || []).map((p, j) => p.personaname || `Player ${i + 1}.${j + 1}`).join(' + ');
}

function slotHtml(i) {
  return (slots[i] || []).map((p, j) => {
    const name = esc(p.personaname || `Player ${i + 1}.${j + 1}`);
    return p.profileurl
      ? `<a href="${esc(p.profileurl)}" target="_blank" rel="noopener" style="color:var(--accent2);text-decoration:none">${name}</a>`
      : name;
  }).join(' + ');
}

function groupSlotsHtml(slotIndices) {
  return [...slotIndices]
    .sort((a, b) => slotDisplayName(a).toLowerCase().localeCompare(slotDisplayName(b).toLowerCase()))
    .map(i => slotHtml(i))
    .join(', ');
}

function renderPage() {
  const sortedSlotIndices = [...slots.keys()].sort((a, b) =>
    slotDisplayName(a).toLowerCase().localeCompare(slotDisplayName(b).toLowerCase())
  );
  const playerList = sortedSlotIndices.map(i => slotHtml(i)).join(', ');

  if (slots.length) {
    document.title = sortedSlotIndices.map(i => slotDisplayName(i)).join(', ') + ' — Steam Common Games';
  }

  const groupSections = groups.map(group => {
    const key = group.userIndices.join(',');
    const usersHtml = groupSlotsHtml(group.userIndices);
    const count = group.games.length;
    return `
      <div class="game-group">
        <div class="group-header">
          <span class="group-title">${usersHtml}</span>
          <span class="group-meta">${count} game${count !== 1 ? 's' : ''}</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              ${thHtml('name', 'Game')}
              ${thHtml('score', 'Score')}
              ${thHtml('main', 'Main Story')}
              ${thHtml('extra', 'Main + Extra')}
            </tr></thead>
            <tbody id="tbody-${key}">
              ${sortedGames(key).map(rowHtml).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }).join('');

  document.getElementById('results').innerHTML = `
    <div class="results-header">
      <h2>${games.length} shared games</h2>
      ${playerList ? `<div class="results-meta">across ${playerList}</div>` : ''}
    </div>
    <div class="progress-wrap">
      <div class="progress-text" id="prog-text">Loading details… 0 / ${games.length}</div>
      <div class="progress-bar-bg"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
    </div>
    ${groupSections}`;

  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortDir = -sortDir;
      else { sortCol = col; sortDir = col === 'name' ? 1 : -1; }
      refreshTable();
    });
  });
}

function thHtml(col, label) {
  const active = sortCol === col ? ' active' : '';
  const icon = sortCol === col ? (sortDir > 0 ? '↑' : '↓') : '↕';
  return `<th class="sortable${active}" data-col="${col}">
    <div class="th-inner">${label}<span class="sort-icon">${icon}</span></div>
  </th>`;
}

function rowHtml(game) {
  const storeUrl = `https://store.steampowered.com/app/${game.appid}`;
  let scoreCell, mainCell, extraCell;

  if (game.loading) {
    scoreCell = '<span class="sk"></span>';
    mainCell  = '<span class="sk sm"></span>';
    extraCell = '<span class="sk sm"></span>';
  } else {
    const r = game.details?.rating;
    const h = game.details?.hltb;

    if (r) {
      scoreCell = `<div class="score-num" style="color:${scoreColor(r.score)}">${r.score}</div>
                   <div class="score-label">${esc(r.desc)}</div>`;
    } else {
      scoreCell = '<span class="dim">—</span>';
    }

    mainCell  = h ? fmtH(h.main)  : '<span class="dim">—</span>';
    extraCell = h ? fmtH(h.extra) : '<span class="dim">—</span>';
  }

  return `<tr data-appid="${game.appid}">
    <td class="td-name"><a href="${storeUrl}" target="_blank" rel="noopener">${esc(game.name)}</a></td>
    <td class="td-score">${scoreCell}</td>
    <td class="td-hltb">${mainCell}</td>
    <td class="td-hltb">${extraCell}</td>
  </tr>`;
}

function updateRow(idx) {
  const game = games[idx];
  const row = document.querySelector(`tr[data-appid="${game.appid}"]`);
  if (row) row.outerHTML = rowHtml(game);
}

function updateProgress(loaded, total) {
  const bar = document.getElementById('prog-bar');
  const txt = document.getElementById('prog-text');
  if (!bar || !txt) return;
  const pct = total ? Math.round((loaded / total) * 100) : 0;
  bar.style.width = `${pct}%`;
  if (loaded >= total) {
    txt.textContent = `All ${total} details loaded`;
    bar.style.background = '#a3cf4e';
  } else {
    txt.textContent = `Loading details… ${loaded} / ${total}`;
  }
}

function refreshTable() {
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    const col = th.dataset.col;
    const active = col === sortCol;
    th.classList.toggle('active', active);
    const icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = active ? (sortDir > 0 ? '↑' : '↓') : '↕';
  });
  for (const group of groups) {
    const key = group.userIndices.join(',');
    const tbody = document.getElementById(`tbody-${key}`);
    if (tbody) tbody.innerHTML = sortedGames(key).map(rowHtml).join('');
  }
}

// ── Sorting ────────────────────────────────────────────────────────────────

function sortedGames(groupKey) {
  const subset = groupKey != null ? games.filter(g => g.groupKey === groupKey) : games;
  return [...subset].sort((a, b) => {
    switch (sortCol) {
      case 'score': {
        const av = a.details?.rating?.score ?? -1;
        const bv = b.details?.rating?.score ?? -1;
        return sortDir * (av - bv);
      }
      case 'main': {
        const av = a.details?.hltb?.main || Infinity;
        const bv = b.details?.hltb?.main || Infinity;
        return sortDir * (av - bv);
      }
      case 'extra': {
        const av = a.details?.hltb?.extra || Infinity;
        const bv = b.details?.hltb?.extra || Infinity;
        return sortDir * (av - bv);
      }
      default:
        return sortDir * a.name.localeCompare(b.name);
    }
  });
}

// ── Helpers ────────────────────────────────────────────────────────────────

function scoreColor(n) {
  if (n == null) return 'var(--text1)';
  if (n >= 80) return '#57cbde';
  if (n >= 65) return '#a3cf4e';
  if (n >= 50) return '#e4a82e';
  return '#cc5050';
}

function fmtH(h) {
  if (!h) return '<span class="dim">—</span>';
  return h % 1 === 0 ? `${h}h` : `${h.toFixed(1)}h`;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
