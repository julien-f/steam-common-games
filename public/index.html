<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam Common Games</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #1b2838;
  --bg1: #2a475e;
  --bg2: #1e3a5f;
  --bg3: #17212b;
  --text0: #c6d4df;
  --text1: #8f98a0;
  --text2: #4c6b8a;
  --accent: #1a9fff;
  --accent2: #66c0f4;
  --border: #3d5068;
  --r: 6px;
}

body {
  background: var(--bg0);
  color: var(--text0);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 36px 20px 60px;
}

/* Header */
header { text-align: center; margin-bottom: 36px; }
header h1 {
  font-size: 26px;
  font-weight: 600;
  color: var(--accent2);
  letter-spacing: 0.4px;
}
header p { color: var(--text1); margin-top: 6px; font-size: 13px; }

/* Card */
.card {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 22px 24px;
  margin-bottom: 18px;
}
.card h2 { font-size: 13px; font-weight: 600; color: var(--text1); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px; }

/* User inputs */
#user-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

.user-row { display: flex; gap: 8px; align-items: center; }
.user-row input {
  flex: 1;
  padding: 9px 12px;
  background: var(--bg0);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text0);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}
.user-row input:focus { border-color: var(--accent); }
.user-row input::placeholder { color: var(--text2); }

.btn {
  padding: 9px 18px;
  border: none;
  border-radius: var(--r);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
.btn-remove {
  flex-shrink: 0;
  width: 32px;
  padding: 0;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text1);
  font-size: 17px;
  line-height: 30px;
  text-align: center;
  border-radius: var(--r);
  cursor: pointer;
}
.btn-remove:hover { background: rgba(200,60,60,0.2); border-color: #cc4040; color: #ff8888; }

.actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text0);
}
.btn-ghost:hover { background: var(--bg0); }

.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: #1490e8; }
.btn-primary:disabled { background: var(--bg2); color: var(--text2); cursor: not-allowed; }

/* Alerts */
.alert {
  padding: 12px 16px;
  border-radius: var(--r);
  margin-bottom: 16px;
  font-size: 13px;
  line-height: 1.5;
}
.alert-error {
  background: rgba(200,50,50,0.12);
  border: 1px solid rgba(200,50,50,0.35);
  color: #ff8888;
}
.alert-warn {
  background: rgba(228,168,46,0.1);
  border: 1px solid rgba(228,168,46,0.3);
  color: #e4c46e;
}

/* Results */
.results-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.results-header h2 { font-size: 16px; font-weight: 600; color: var(--text0); }
.results-meta { font-size: 12px; color: var(--text1); }

/* Progress */
.progress-wrap { margin-bottom: 14px; }
.progress-text { font-size: 12px; color: var(--text1); margin-bottom: 6px; }
.progress-bar-bg {
  background: var(--bg3);
  border-radius: 999px;
  height: 3px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: var(--accent);
  transition: width 0.25s ease;
  border-radius: 999px;
}

/* Table */
.table-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--r);
}

table { width: 100%; border-collapse: collapse; }

thead th {
  background: var(--bg3);
  color: var(--text1);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 9px 14px;
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  user-select: none;
}
thead th.sortable { cursor: pointer; }
thead th.sortable:hover { color: var(--text0); }
thead th.active { color: var(--accent2); }
.th-inner { display: flex; align-items: center; gap: 5px; }
.sort-icon { font-size: 10px; opacity: 0.5; }
thead th.active .sort-icon { opacity: 1; }

tbody tr { border-bottom: 1px solid rgba(61,80,104,0.4); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(42,71,94,0.45); }

tbody td { padding: 9px 14px; vertical-align: middle; }

/* Game name cell */
.td-name { min-width: 200px; }
.td-name a { color: var(--text0); text-decoration: none; font-weight: 500; }
.td-name a:hover { color: var(--accent2); }

/* Score cell */
.td-score { min-width: 100px; }
.score-num {
  font-size: 19px;
  font-weight: 700;
  line-height: 1;
}
.score-label { font-size: 11px; color: var(--text1); margin-top: 2px; }

/* HLTB cells */
.td-hltb { min-width: 80px; font-variant-numeric: tabular-nums; }

.dim { color: var(--text2); }

/* Game groups */
.game-group { margin-bottom: 32px; }
.group-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
}
.group-title { font-size: 15px; font-weight: 600; color: var(--text0); }
.group-meta { font-size: 12px; color: var(--text1); }

/* Skeleton shimmer */
@keyframes shimmer {
  0%   { background-position: -300px 0; }
  100% { background-position:  300px 0; }
}
.sk {
  display: inline-block;
  width: 52px;
  height: 14px;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--bg1) 25%, #3a5870 50%, var(--bg1) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s linear infinite;
  vertical-align: middle;
}
.sk.sm { width: 32px; height: 13px; }

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block;
  width: 15px; height: 15px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  vertical-align: middle;
  margin-right: 7px;
}

/* Family member sub-rows */
.player-slot { display: flex; flex-direction: column; gap: 6px; }
.family-row { display: flex; gap: 8px; align-items: center; padding-left: 40px; }
.btn-add-family {
  flex-shrink: 0;
  width: 32px;
  padding: 0;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 17px;
  line-height: 30px;
  text-align: center;
  border-radius: var(--r);
  cursor: pointer;
}
.btn-add-family:hover { background: rgba(26,159,255,0.12); border-color: var(--accent); color: var(--accent); }

/* Filter panel */
.filter-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.filter-header h2 { margin-bottom: 0; }
.filter-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 16px;
  height: 16px;
  padding: 0 4px;
  border-radius: 8px;
  margin-left: 6px;
  vertical-align: middle;
}
.btn-sm { padding: 5px 10px; font-size: 12px; }
.filter-dims { display: flex; flex-wrap: wrap; gap: 16px; }
.filter-dim { flex: 1 1 160px; }
.filter-dim-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text1);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.filter-opts {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 160px;
  overflow-y: auto;
}
.filter-opt {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  cursor: pointer;
  line-height: 1.4;
  user-select: none;
}
.filter-opt input[type="checkbox"] { cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
.filter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}
.filter-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(26,159,255,0.15);
  border: 1px solid rgba(26,159,255,0.4);
  color: var(--accent);
  font-size: 12px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 12px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.filter-chip:hover { background: rgba(26,159,255,0.28); }
.filter-chip-x { font-size: 14px; line-height: 1; opacity: 0.7; }
.filter-search {
  width: 100%;
  box-sizing: border-box;
  padding: 4px 8px;
  margin-bottom: 6px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text0);
  font-size: 12px;
}
.filter-search:focus { outline: none; border-color: var(--accent); }

/* Clickable rows */
tbody tr.game-row { cursor: pointer; }
tbody tr.game-row.active { background: rgba(26,159,255,0.08) !important; }

/* Side panel backdrop */
.panel-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.panel-backdrop.open { opacity: 1; pointer-events: auto; }

/* Side panel drawer */
.game-panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 380px;
  max-width: 100vw;
  background: var(--bg1);
  border-left: 1px solid var(--border);
  z-index: 101;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  overflow: hidden;
}
.game-panel.open { transform: translateX(0); box-shadow: -8px 0 32px rgba(0,0,0,0.4); }

@media (min-width: 1400px) {
  .game-panel { width: min(480px, 30vw); }
}

.panel-close {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 28px; height: 28px;
  border: none;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  color: var(--text0);
  font-size: 18px;
  line-height: 28px;
  text-align: center;
  cursor: pointer;
  z-index: 1;
  padding: 0;
}
.panel-close:hover { background: rgba(0,0,0,0.75); }

.panel-img {
  width: 100%;
  aspect-ratio: 460 / 215;
  object-fit: cover;
  background: var(--bg3);
  display: block;
  flex-shrink: 0;
}
.panel-img.loading {
  background: linear-gradient(90deg, var(--bg1) 25%, #3a5870 50%, var(--bg1) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s linear infinite;
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px 28px;
}

.panel-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text0);
  margin-bottom: 4px;
  line-height: 1.35;
}

.panel-release {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 10px;
}

.panel-desc {
  font-size: 12px;
  color: var(--text1);
  line-height: 1.5;
  margin-bottom: 18px;
}

.panel-section { margin-bottom: 18px; }
.panel-section-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text2);
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel-section-title a {
  font-size: inherit;
  color: inherit;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.panel-section-title a:hover { color: var(--accent2); border-bottom-color: var(--accent2); }

.panel-score-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
.panel-score-num { font-size: 32px; font-weight: 700; line-height: 1; }
.panel-score-desc { font-size: 13px; color: var(--text1); }
.panel-reviews { font-size: 12px; color: var(--text1); }

.panel-hltb { display: flex; gap: 24px; }
.panel-hltb-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.panel-hltb-val { font-size: 20px; font-weight: 600; color: var(--text0); }

.panel-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.panel-tag {
  background: rgba(61,80,104,0.5);
  border: 1px solid var(--border);
  color: var(--text1);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 3px;
}
.panel-tag-btn {
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.panel-tag-btn:hover { border-color: var(--accent); color: var(--accent2); }
.panel-tag-btn.active { background: rgba(26,159,255,0.15); border-color: rgba(26,159,255,0.4); color: var(--accent); }
.panel-tag-playtime { color: var(--text2); }

.panel-links { display: flex; gap: 8px; flex-wrap: wrap; }
.panel-link {
  display: inline-block;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--bg2);
  color: var(--text1);
  font-size: 12px;
  text-decoration: none;
  transition: border-color 0.15s, color 0.15s;
}
.panel-link:hover { border-color: var(--accent); color: var(--accent2); }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Steam Common Games</h1>
    <p>Find games shared across multiple Steam libraries, with ratings and playtime estimates</p>
  </header>

  <div class="card">
    <h2>Steam Users</h2>
    <div id="user-inputs"></div>
    <div class="actions">
      <button class="btn btn-ghost" id="add-btn">+ Add player</button>
      <button class="btn btn-primary" id="search-btn">Find Common Games</button>
    </div>
  </div>

  <div id="alerts"></div>
  <div id="filter-panel"></div>
  <div id="results"></div>

</div>

<div id="panel-backdrop" class="panel-backdrop"></div>
<div id="game-panel" class="game-panel" role="dialog" aria-modal="true">
  <button id="panel-close" class="panel-close" aria-label="Close">×</button>
  <img id="panel-img" class="panel-img" src="" alt="">
  <div id="panel-body" class="panel-body"></div>
</div>

<script src="/utils.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────

let games = [];     // flat: { appid, name, groupKey, loading, details }
let groups = [];    // [{ userIndices, games }] — ordered, from server
let slots = [];     // [[{steamid, personaname, profileurl}, ...], ...] — one entry per logical player
let playtime = {};  // { [appid]: { [steamId]: minutes } } — per-account playtime for common games
let sortCol = 'score';
let sortDir = -1;
let runId = 0;           // increments on each search to cancel stale updates
let streamController = null; // AbortController for the active detail stream
let refreshDebounceTimer = null;
let panelGame = null;

// Filter state — reset on each new search
const activeFilters = { genres: new Set(), categories: new Set(), developers: new Set(), publishers: new Set() };
const allOpts       = { genres: new Set(), categories: new Set(), developers: new Set(), publishers: new Set() };
const filterSearch  = { genres: '', categories: '', developers: '', publishers: '' };

// ── Init ───────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('add-btn').addEventListener('click', () => addPlayerSlot());
  document.getElementById('search-btn').addEventListener('click', findCommonGames);

  document.getElementById('results').addEventListener('click', e => {
    const row = e.target.closest('tr.game-row');
    if (!row || e.target.closest('a')) return;
    const appid = Number(row.dataset.appid);
    const game = games.find(g => g.appid === appid);
    if (game) openPanel(game);
  });

  document.getElementById('panel-backdrop').addEventListener('click', closePanel);
  document.getElementById('panel-close').addEventListener('click', closePanel);
  document.getElementById('game-panel').addEventListener('click', e => {
    const btn = e.target.closest('.panel-tag-btn');
    if (!btn) return;
    const { dim, val } = btn.dataset;
    if (activeFilters[dim].has(val)) activeFilters[dim].delete(val);
    else activeFilters[dim].add(val);
    refreshTable();
    updateFilterUrl();
    renderFilterPanel();
    renderPanel();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closePanel(); return; }
    if (!panelGame || (e.key !== 'ArrowUp' && e.key !== 'ArrowDown')) return;
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    e.preventDefault();
    const list = sortedGames(panelGame.groupKey);
    const idx = list.findIndex(g => g.appid === panelGame.appid);
    const next = e.key === 'ArrowDown' ? idx + 1 : idx - 1;
    if (next >= 0 && next < list.length) openPanel(list[next]);
  });

  fetch('/api/health').then(r => r.json()).then(d => {
    if (!d.configured) {
      showAlert(
        'STEAM_API_KEY is not configured. ' +
        'Get one at steamcommunity.com/dev/apikey, then restart: STEAM_API_KEY=yourkey node server.js',
        'warn'
      );
    }
  }).catch(() => {});

  loadFromUrl();
});

// Restore state when the user navigates back/forward
window.addEventListener('popstate', loadFromUrl);

function loadFromUrl() {
  // Each u= param is a comma-joined list of accounts for one logical player slot.
  // Old single-account URLs (?u=alice&u=bob) parse naturally as single-member slots.
  const params = new URLSearchParams(location.search);
  const urlSlots = params.getAll('u')
    .map(s => s.split(',').map(v => v.trim()).filter(Boolean));
  const container = document.getElementById('user-inputs');
  container.innerHTML = '';
  if (urlSlots.length >= 2 && urlSlots.every(s => s.length > 0)) {
    urlSlots.forEach(accounts => addPlayerSlot(accounts));
    const restoreFilters = {
      genres:     params.getAll('genre'),
      categories: params.getAll('cat'),
      developers: params.getAll('dev'),
      publishers: params.getAll('pub'),
    };
    findCommonGames({ pushState: false, restoreFilters });
  } else {
    addPlayerSlot();
    addPlayerSlot();
    games = [];
    slots = [];
    for (const s of Object.values(activeFilters)) s.clear();
    for (const s of Object.values(allOpts)) s.clear();
    for (const k of Object.keys(filterSearch)) filterSearch[k] = '';
    document.getElementById('filter-panel').innerHTML = '';
    document.getElementById('results').innerHTML = '';
    document.title = 'Steam Common Games';
  }
}

// ── Player slot input rows ─────────────────────────────────────────────────

function addPlayerSlot(accounts = ['']) {
  const container = document.getElementById('user-inputs');
  const slot = document.createElement('div');
  slot.className = 'player-slot';

  const primaryRow = document.createElement('div');
  primaryRow.className = 'user-row';

  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Steam username, profile URL, or 64-bit ID';
  input.value = accounts[0] || '';
  input.addEventListener('keydown', e => { if (e.key === 'Enter') findCommonGames(); });

  const addFamilyBtn = document.createElement('button');
  addFamilyBtn.className = 'btn-add-family';
  addFamilyBtn.title = 'Add a family member who shares their library with this player';
  addFamilyBtn.textContent = '+';
  addFamilyBtn.addEventListener('click', () => addFamilyMember(slot));

  const removeSlotBtn = document.createElement('button');
  removeSlotBtn.className = 'btn-remove';
  removeSlotBtn.title = 'Remove player';
  removeSlotBtn.textContent = '×';
  removeSlotBtn.addEventListener('click', () => {
    if (document.querySelectorAll('.player-slot').length > 2) slot.remove();
  });

  primaryRow.appendChild(input);
  primaryRow.appendChild(addFamilyBtn);
  primaryRow.appendChild(removeSlotBtn);
  slot.appendChild(primaryRow);

  for (let i = 1; i < accounts.length; i++) addFamilyMember(slot, accounts[i]);

  container.appendChild(slot);
  if (!accounts[0]) input.focus();
}

function addFamilyMember(slot, value = '') {
  const row = document.createElement('div');
  row.className = 'family-row';

  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Steam username, profile URL, or 64-bit ID';
  input.value = value;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') findCommonGames(); });

  const rm = document.createElement('button');
  rm.className = 'btn-remove';
  rm.title = 'Remove family member';
  rm.textContent = '−';
  rm.addEventListener('click', () => row.remove());

  row.appendChild(input);
  row.appendChild(rm);
  slot.appendChild(row);
  if (!value) input.focus();
}

function getSlots() {
  return [...document.querySelectorAll('.player-slot')].map(slot =>
    [...slot.querySelectorAll('input')]
      .map(i => normalizeInput(i.value.trim()))
      .filter(Boolean)
  ).filter(s => s.length > 0);
}

// ── Alerts ─────────────────────────────────────────────────────────────────

function clearAlerts() { document.getElementById('alerts').innerHTML = ''; }

function showAlert(msg, type = 'error') {
  const el = document.createElement('div');
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  const box = document.getElementById('alerts');
  box.innerHTML = '';
  box.appendChild(el);
}

// ── Main search flow ───────────────────────────────────────────────────────

async function findCommonGames({ pushState = true, restoreFilters = null } = {}) {
  const inputSlots = getSlots();
  if (inputSlots.length < 2) { showAlert('Enter at least 2 Steam users.'); return; }

  clearAlerts();

  if (pushState) {
    const params = new URLSearchParams();
    const cmp = (a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' });
    [...inputSlots]
      .map(slot => [...slot].sort(cmp))           // sort members within each slot
      .sort((a, b) => cmp(a[0], b[0]))            // sort slots by their first member
      .forEach(slot => params.append('u', slot.join(',')));
    history.pushState(null, '', `?${params}`);
  }

  const thisRun = ++runId;
  closePanel();
  for (const s of Object.values(activeFilters)) s.clear();
  for (const s of Object.values(allOpts)) s.clear();
  for (const k of Object.keys(filterSearch)) filterSearch[k] = '';
  if (restoreFilters) {
    for (const [k, vals] of Object.entries(restoreFilters)) {
      for (const v of vals) activeFilters[k].add(v);
    }
  }
  document.getElementById('filter-panel').innerHTML = '';
  document.getElementById('search-btn').disabled = true;
  document.getElementById('results').innerHTML =
    '<div style="padding:16px 0;color:var(--text1)"><span class="spinner"></span>Fetching Steam libraries…</div>';

  try {
    const res = await fetch('/api/common-games', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slots: inputSlots }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    if (thisRun !== runId) return;
    groups = data.groups || [];
    games = groups.flatMap(g => {
      const key = g.userIndices.join(',');
      return g.games.map(game => ({ ...game, groupKey: key, loading: true, details: null }));
    });
    slots = data.slots || [];
    playtime = data.playtime || {};

    renderPage();
    restorePanelFromUrl();
    await loadAllDetails(thisRun);
    if (thisRun === runId) { refreshTable(); restorePanelFromUrl(); }
  } catch (err) {
    if (thisRun !== runId) return;
    showAlert(err.message);
    document.getElementById('results').innerHTML = '';
  } finally {
    document.getElementById('search-btn').disabled = false;
  }
}

// ── Progressive detail loading ─────────────────────────────────────────────

async function loadAllDetails(thisRun) {
  if (!games.length) return;

  streamController?.abort();
  const controller = new AbortController();
  streamController = controller;

  updateProgress(0, games.length);
  let loaded = 0;

  const idxByAppid = new Map(games.map((g, i) => [g.appid, i]));

  let res;
  try {
    res = await fetch('/api/game-details/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ games: games.map(g => ({ appid: g.appid, name: g.name })) }),
      signal: controller.signal,
    });
  } catch {
    return; // aborted or network error
  }

  if (!res.ok) return;

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  try {
    for (;;) {
      if (thisRun !== runId) { reader.cancel(); return; }
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const chunks = buffer.split('\n\n');
      buffer = chunks.pop(); // keep any incomplete trailing chunk

      for (const chunk of chunks) {
        if (!chunk.startsWith('data: ')) continue;
        let data;
        try { data = JSON.parse(chunk.slice(6)); } catch { continue; }

        if (data.done) return;
        if (thisRun !== runId) { reader.cancel(); return; }

        const idx = idxByAppid.get(data.appid);
        if (idx === undefined) continue;

        games[idx].details = { rating: data.rating, hltb: data.hltb, meta: data.meta };
        games[idx].loading = false;
        loaded++;
        updateProgress(loaded, games.length);
        if (games[idx].details?.meta) updateFilterOptions(games[idx].details.meta);
        if (panelGame?.appid === games[idx].appid) renderPanel();
        const tr = document.querySelector(`tr.game-row[data-appid="${data.appid}"]`);
        if (tr) syncRow(tr, games[idx]);
        clearTimeout(refreshDebounceTimer);
        refreshDebounceTimer = setTimeout(refreshTable, 150);
      }
    }
  } catch {
    // stream ended or aborted
  }
}

// ── Rendering ──────────────────────────────────────────────────────────────

function slotDisplayName(i) {
  return (slots[i] || []).map((p, j) => p.personaname || `Player ${i + 1}.${j + 1}`).join(' + ');
}

function slotHtml(i) {
  return (slots[i] || []).map((p, j) => {
    const name = esc(p.personaname || `Player ${i + 1}.${j + 1}`);
    const safeUrl = /^https?:\/\//i.test(p.profileurl) ? p.profileurl : '';
    return safeUrl
      ? `<a href="${esc(safeUrl)}" target="_blank" rel="noopener" style="color:var(--accent2);text-decoration:none">${name}</a>`
      : name;
  }).join(' + ');
}

function groupSlotsHtml(slotIndices) {
  return [...slotIndices]
    .sort((a, b) => slotDisplayName(a).toLowerCase().localeCompare(slotDisplayName(b).toLowerCase()))
    .map(i => slotHtml(i))
    .join(', ');
}

function renderPage() {
  const sortedSlotIndices = [...slots.keys()].sort((a, b) =>
    slotDisplayName(a).toLowerCase().localeCompare(slotDisplayName(b).toLowerCase())
  );
  const playerList = sortedSlotIndices.map(i => slotHtml(i)).join(', ');

  if (slots.length) {
    document.title = sortedSlotIndices.map(i => slotDisplayName(i)).join(', ') + ' — Steam Common Games';
  }

  const groupSections = groups.map(group => {
    const key = group.userIndices.join(',');
    const usersHtml = groupSlotsHtml(group.userIndices);
    const count = group.games.length;
    return `
      <div class="game-group" id="group-${key}">
        <div class="group-header">
          <span class="group-title">${usersHtml}</span>
          <span class="group-meta">${count} game${count !== 1 ? 's' : ''}</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              ${thHtml('name', 'Game')}
              ${thHtml('score', 'Score')}
              ${thHtml('main', 'Main Story')}
              ${thHtml('extra', 'Main + Extra')}
            </tr></thead>
            <tbody id="tbody-${key}">
              ${sortedGames(key).map(rowHtml).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }).join('');

  document.getElementById('results').innerHTML = `
    <div class="results-header">
      <h2 id="results-count">${games.length} shared games</h2>
      ${playerList ? `<div class="results-meta">across ${playerList}</div>` : ''}
    </div>
    <div class="progress-wrap">
      <div class="progress-text" id="prog-text">Loading details… 0 / ${games.length}</div>
      <div class="progress-bar-bg"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
    </div>
    ${groupSections}`;

  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortDir = -sortDir;
      else { sortCol = col; sortDir = col === 'name' ? 1 : -1; }
      refreshTable();
    });
  });
}

function thHtml(col, label) {
  const active = sortCol === col ? ' active' : '';
  const icon = sortCol === col ? (sortDir > 0 ? '↑' : '↓') : '↕';
  return `<th class="sortable${active}" data-col="${col}">
    <div class="th-inner">${label}<span class="sort-icon">${icon}</span></div>
  </th>`;
}

function rowHtml(game) {
  const storeUrl = `https://store.steampowered.com/app/${game.appid}`;
  let scoreCell, mainCell, extraCell;

  if (game.loading) {
    scoreCell = '<span class="sk"></span>';
    mainCell  = '<span class="sk sm"></span>';
    extraCell = '<span class="sk sm"></span>';
  } else {
    const r = game.details?.rating;
    const h = game.details?.hltb;

    if (r) {
      scoreCell = `<div class="score-num" style="color:${scoreColor(r.score)}">${r.score}</div>
                   <div class="score-label">${esc(r.desc)}</div>`;
    } else {
      scoreCell = '<span class="dim">—</span>';
    }

    mainCell  = h ? fmtH(h.main)  : '<span class="dim">—</span>';
    extraCell = h ? fmtH(h.extra) : '<span class="dim">—</span>';
  }

  const active = panelGame?.appid === game.appid ? ' active' : '';
  return `<tr class="game-row${active}" data-appid="${game.appid}">
    <td class="td-name"><a href="${storeUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(game.name)}</a></td>
    <td class="td-score">${scoreCell}</td>
    <td class="td-hltb">${mainCell}</td>
    <td class="td-hltb">${extraCell}</td>
  </tr>`;
}

function updateProgress(loaded, total) {
  const bar = document.getElementById('prog-bar');
  const txt = document.getElementById('prog-text');
  if (!bar || !txt) return;
  const pct = total ? Math.round((loaded / total) * 100) : 0;
  bar.style.width = `${pct}%`;
  if (loaded >= total) {
    txt.textContent = `All ${total} details loaded`;
    bar.style.background = '#a3cf4e';
  } else {
    txt.textContent = `Loading details… ${loaded} / ${total}`;
  }
}

// ── Side panel ─────────────────────────────────────────────────────────────

function openPanel(game) {
  panelGame = game;
  document.getElementById('panel-body').scrollTop = 0;
  const img = document.getElementById('panel-img');
  img.style.display = '';
  img.classList.add('loading');
  img.onload  = () => img.classList.remove('loading');
  img.onerror = () => { img.classList.remove('loading'); img.style.display = 'none'; };
  img.src = `https://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/header.jpg`;
  renderPanel();
  document.getElementById('game-panel').classList.add('open');
  document.getElementById('panel-backdrop').classList.add('open');
  refreshTable(); // re-render rows so the active highlight appears
  setPanelParam(game.appid);
}

function closePanel() {
  if (!panelGame) return;
  panelGame = null;
  document.getElementById('game-panel').classList.remove('open');
  document.getElementById('panel-backdrop').classList.remove('open');
  refreshTable(); // remove active highlight
  setPanelParam(null);
}

function setPanelParam(appid) {
  const params = new URLSearchParams(location.search);
  if (appid == null) {
    params.delete('game');
  } else {
    params.set('game', appid);
  }
  history.replaceState(null, '', `?${params}`);
}

function restorePanelFromUrl() {
  const appid = Number(new URLSearchParams(location.search).get('game'));
  if (!appid) return;
  const game = games.find(g => g.appid === appid);
  if (game && panelGame?.appid !== appid) openPanel(game);
}

      const parts = accounts.map(p => {

      });

  } else if (r) {

          return `<button class="panel-tag panel-tag-btn${active}" data-dim="${dim}" data-val="${esc(v)}">${esc(v)}</button>`;
        }

function refreshTable() {
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    const col = th.dataset.col;
    const active = col === sortCol;
    th.classList.toggle('active', active);
    const icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = active ? (sortDir > 0 ? '↑' : '↓') : '↕';
  });
  for (const group of groups) {
    const key = group.userIndices.join(',');
    const tbody = document.getElementById(`tbody-${key}`);
    if (!tbody) continue;
    reconcileTbody(tbody, sortedGames(key));
    const groupEl = document.getElementById(`group-${key}`);
    if (groupEl) groupEl.style.display = tbody.childElementCount === 0 ? 'none' : '';
  }

  const countEl = document.getElementById('results-count');
  if (countEl) {
    const filtered = games.filter(gameMatchesFilters).length;
    countEl.textContent = hasActiveFilters()
      ? `${filtered} / ${games.length} shared games`
      : `${games.length} shared games`;
  }
}

// Reconcile a tbody's rows against a desired ordered game list.
// Reuses existing <tr> nodes (moves/updates them) rather than replacing innerHTML,
// so in-flight click events always target a live DOM node.
function reconcileTbody(tbody, desired) {
  // Index existing rows by appid for O(1) lookup.
  const existing = new Map();
  for (const tr of tbody.querySelectorAll('tr.game-row')) {
    existing.set(Number(tr.dataset.appid), tr);
  }

  // Insert/move rows into the correct order.
  for (let i = 0; i < desired.length; i++) {
    const game = desired[i];
    let tr = existing.get(game.appid);
    if (!tr) {
      tr = document.createElement('tr');
      tr.className = 'game-row';
      tr.dataset.appid = game.appid;
    }
    syncRow(tr, game); // always sync content and active state
    // Move to the correct position if needed (insertBefore is a no-op when the
    // node is already in the right place in the same parent).
    const current = tbody.children[i];
    if (current !== tr) tbody.insertBefore(tr, current ?? null);
    existing.delete(game.appid);
  }

  // Remove rows that are no longer in the desired list.
  for (const tr of existing.values()) tr.remove();
}

// Update an existing <tr>'s cells and active state in place.
function syncRow(tr, game) {
  const active = panelGame?.appid === game.appid;
  tr.classList.toggle('active', active);
  const cells = tr.cells;
  if (!cells.length) { tr.innerHTML = rowCells(game); return; }

  const storeUrl = `https://store.steampowered.com/app/${game.appid}`;
  cells[0].innerHTML = `<a href="${storeUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(game.name)}</a>`;

  if (game.loading) {
    cells[1].innerHTML = '<span class="sk"></span>';
    cells[2].innerHTML = '<span class="sk sm"></span>';
    cells[3].innerHTML = '<span class="sk sm"></span>';
  } else {
    const r = game.details?.rating;
    const h = game.details?.hltb;
    cells[1].innerHTML = r
      ? `<div class="score-num" style="color:${scoreColor(r.score)}">${r.score}</div><div class="score-label">${esc(r.desc)}</div>`
      : '<span class="dim">—</span>';
    cells[2].innerHTML = h ? fmtH(h.main)  : '<span class="dim">—</span>';
    cells[3].innerHTML = h ? fmtH(h.extra) : '<span class="dim">—</span>';
  }
}

// Render the four <td> cells for a new <tr> (active class is set by syncRow).
function rowCells(game) {
  const storeUrl = `https://store.steampowered.com/app/${game.appid}`;
  let scoreCell, mainCell, extraCell;
  if (game.loading) {
    scoreCell = '<span class="sk"></span>';
    mainCell  = '<span class="sk sm"></span>';
    extraCell = '<span class="sk sm"></span>';
  } else {
    const r = game.details?.rating;
    const h = game.details?.hltb;
    scoreCell = r
      ? `<div class="score-num" style="color:${scoreColor(r.score)}">${r.score}</div><div class="score-label">${esc(r.desc)}</div>`
      : '<span class="dim">—</span>';
    mainCell  = h ? fmtH(h.main)  : '<span class="dim">—</span>';
    extraCell = h ? fmtH(h.extra) : '<span class="dim">—</span>';
  }
  return `<td class="td-name"><a href="${storeUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(game.name)}</a></td>
    <td class="td-score">${scoreCell}</td>
    <td class="td-hltb">${mainCell}</td>
    <td class="td-hltb">${extraCell}</td>`;
}

// ── Sorting ────────────────────────────────────────────────────────────────

function sortedGames(groupKey) {
  const subset = (groupKey != null ? games.filter(g => g.groupKey === groupKey) : games)
    .filter(gameMatchesFilters);
  return [...subset].sort((a, b) => {
    switch (sortCol) {
      case 'score': {
        const av = a.details?.rating?.score ?? -1;
        const bv = b.details?.rating?.score ?? -1;
        return sortDir * (av - bv);
      }
      case 'main': {
        const av = a.details?.hltb?.main ?? Infinity;
        const bv = b.details?.hltb?.main ?? Infinity;
        return sortDir * (av - bv);
      }
      case 'extra': {
        const av = a.details?.hltb?.extra ?? Infinity;
        const bv = b.details?.hltb?.extra ?? Infinity;
        return sortDir * (av - bv);
      }
      default:
        return sortDir * a.name.localeCompare(b.name);
    }
  });
}

// ── Filtering ──────────────────────────────────────────────────────────────

function updateFilterUrl() {
  const cmp = (a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' });
  const params = new URLSearchParams();
  // Preserve current player slots as-is — already canonical from the last pushState
  const prev = new URLSearchParams(location.search);
  prev.getAll('u').forEach(u => params.append('u', u));
  if (prev.has('game')) params.set('game', prev.get('game'));
  // Append filter values in fixed dimension order, each sorted alphabetically
  for (const [param, key] of [['genre','genres'],['cat','categories'],['dev','developers'],['pub','publishers']]) {
    [...activeFilters[key]].sort(cmp).forEach(v => params.append(param, v));
  }
  history.replaceState(null, '', `?${params}`);
}

function hasActiveFilters() {
  return ['genres', 'categories', 'developers', 'publishers'].some(k => activeFilters[k].size > 0);
}

function gameMatchesFilters(game) {
  if (!hasActiveFilters()) return true;
  if (game.loading) return false; // details not yet fetched — exclude until we know
  const meta = game.details?.meta;
  if (!meta) return false; // details loaded but Store API failed — can't confirm a match, exclude
  return (!activeFilters.genres.size     || meta.genres.some(v     => activeFilters.genres.has(v)))
      && (!activeFilters.categories.size || meta.categories.some(v => activeFilters.categories.has(v)))
      && (!activeFilters.developers.size || meta.developers.some(v => activeFilters.developers.has(v)))
      && (!activeFilters.publishers.size || meta.publishers.some(v => activeFilters.publishers.has(v)));
}

function updateFilterOptions(meta) {
  const KEYS = ['genres', 'categories', 'developers', 'publishers'];
  const newByKey = Object.fromEntries(KEYS.map(k => [k, []]));
  for (const key of KEYS) {
    for (const v of (meta[key] || [])) {
      if (!allOpts[key].has(v)) { allOpts[key].add(v); newByKey[key].push(v); }
    }
  }
  if (KEYS.every(k => !newByKey[k].length)) return;

  const panelEl = document.getElementById('filter-panel');
  const needsNewDim = KEYS.some(k =>
    newByKey[k].length > 0 && !panelEl.querySelector(`input[data-search-dim="${k}"]`)
  );

  if (needsNewDim || !panelEl.querySelector('.card')) {
    // Full rebuild needed — preserve focus in search inputs
    const focused = document.activeElement;
    const focusedDim = focused?.dataset?.searchDim;
    const selStart = focused?.selectionStart;
    const selEnd = focused?.selectionEnd;
    renderFilterPanel();
    if (focusedDim) {
      const el = panelEl.querySelector(`input[data-search-dim="${focusedDim}"]`);
      if (el) { el.focus(); try { el.setSelectionRange(selStart, selEnd); } catch {} }
    }
    return;
  }

  // Surgical: append new options into existing dimension containers
  for (const key of KEYS) {
    if (!newByKey[key].length) continue;
    const optsContainer = panelEl
      .querySelector(`input[data-search-dim="${key}"]`)
      ?.closest('.filter-dim')
      ?.querySelector('.filter-opts');
    if (!optsContainer) continue;

    for (const v of newByKey[key]) {
      const label = document.createElement('label');
      label.className = 'filter-opt';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.dataset.dim = key;
      cb.value = v;
      label.appendChild(cb);
      label.appendChild(document.createTextNode(' ' + v));

      if (filterSearch[key] && !v.toLowerCase().includes(filterSearch[key].toLowerCase())) {
        label.style.display = 'none';
      }

      // Insert in sorted position
      const existing = [...optsContainer.querySelectorAll('.filter-opt')];
      const after = existing.find(el => (el.querySelector('input')?.value ?? '').localeCompare(v) > 0);
      if (after) optsContainer.insertBefore(label, after);
      else optsContainer.appendChild(label);

      cb.addEventListener('change', () => {
        if (cb.checked) activeFilters[key].add(v);
        else activeFilters[key].delete(v);
        refreshTable();
        updateFilterUrl();
        renderFilterPanel();
      });
    }
  }
}

function applySearch(dim, query) {
  const q = query.toLowerCase();
  const inp = document.querySelector(`input[data-search-dim="${dim}"]`);
  if (!inp) return;
  inp.closest('.filter-dim').querySelectorAll('.filter-opt').forEach(label => {
    const val = label.querySelector('input')?.value ?? '';
    label.style.display = !q || val.toLowerCase().includes(q) ? '' : 'none';
  });
}

function renderFilterPanel() {
  const DIMS = [
    { key: 'genres',     label: 'Genre' },
    { key: 'categories', label: 'Category' },
    { key: 'developers', label: 'Developer' },
    { key: 'publishers', label: 'Publisher' },
  ];
  const activeDims = DIMS.filter(d => allOpts[d.key].size > 0);
  if (!activeDims.length) return;

  const totalActive = ['genres', 'categories', 'developers', 'publishers']
    .reduce((n, k) => n + activeFilters[k].size, 0);

  const chips = DIMS.flatMap(d =>
    [...activeFilters[d.key]].sort().map(v => `
      <span class="filter-chip" data-chip-dim="${d.key}" data-chip-val="${esc(v)}">
        <span class="filter-chip-label">${esc(d.label)}: ${esc(v)}</span>
        <span class="filter-chip-x">×</span>
      </span>`)
  ).join('');

  document.getElementById('filter-panel').innerHTML = `
    <div class="card">
      <div class="filter-header">
        <h2>Filter${totalActive ? `<span class="filter-badge">${totalActive}</span>` : ''}</h2>
        ${totalActive ? '<button class="btn btn-ghost btn-sm" id="clear-filters-btn">Clear all</button>' : ''}
      </div>
      ${chips ? `<div class="filter-chips">${chips}</div>` : ''}
      <div class="filter-dims">
        ${activeDims.map(d => `
          <div class="filter-dim">
            <div class="filter-dim-title">${d.label}</div>
            <input class="filter-search" type="search" placeholder="Search…" data-search-dim="${d.key}" value="${esc(filterSearch[d.key])}">
            <div class="filter-opts">
              ${[...allOpts[d.key]].sort().map(v => `
                <label class="filter-opt">
                  <input type="checkbox" data-dim="${d.key}" value="${esc(v)}"${activeFilters[d.key].has(v) ? ' checked' : ''}>
                  ${esc(v)}
                </label>
              `).join('')}
            </div>
          </div>`).join('')}
      </div>
    </div>`;

  document.getElementById('filter-panel').querySelectorAll('input[data-dim]').forEach(cb => {
    cb.addEventListener('change', () => {
      const dim = cb.dataset.dim;
      if (cb.checked) activeFilters[dim].add(cb.value);
      else activeFilters[dim].delete(cb.value);
      refreshTable();
      updateFilterUrl();
      renderFilterPanel();
    });
  });

  document.getElementById('filter-panel').querySelectorAll('input[data-search-dim]').forEach(inp => {
    const dim = inp.dataset.searchDim;
    applySearch(dim, filterSearch[dim]);
    inp.addEventListener('input', () => {
      filterSearch[dim] = inp.value;
      applySearch(dim, inp.value);
    });
  });

  document.getElementById('filter-panel').querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      activeFilters[chip.dataset.chipDim].delete(chip.dataset.chipVal);
      refreshTable();
      updateFilterUrl();
      renderFilterPanel();
    });
  });

  const clearBtn = document.getElementById('clear-filters-btn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      for (const s of Object.values(activeFilters)) s.clear();
      refreshTable();
      updateFilterUrl();
      renderFilterPanel();
    });
  }
}

</script>
</body>
</html>
